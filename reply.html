<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reply to SMS</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main id="app">
      <section class="reply-card">
        <header class="brand">
          <img src="/assets/logo.png" alt="GeorgeTech SMS Portal" class="logo" />
          <div>
            <span class="eyebrow">Secure SMS reply</span>
            <h1>Reply to SMS</h1>
          </div>
        </header>
        <p id="state" class="muted status-text">Checking reply link...</p>

        <form id="verify-form" class="form-stack" hidden>
          <label>
            Last 4 digits of your phone number
            <input id="phone-last4" class="code-input" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" autocomplete="one-time-code" placeholder="1234" required />
          </label>
          <label>
            4 digit passcode
            <input id="passcode" class="code-input" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" autocomplete="one-time-code" placeholder="0000" required />
          </label>
          <button id="verify-button" type="submit">Continue</button>
        </form>

        <article id="message-context" class="context" hidden>
          <span>Original message</span>
          <strong id="sender"></strong>
          <p id="body"></p>
        </article>

        <form id="reply-form" class="form-stack" hidden>
          <label>
            Your reply
            <textarea id="reply-message" rows="7" maxlength="1900" required></textarea>
          </label>
          <div class="footer">
            <span id="char-count">0 / 1900</span>
            <button id="send-button" type="submit">Send Reply</button>
          </div>
        </form>
      </section>
    </main>
    <script>
      const supabaseUrl = 'https://lgchqleltppfdgtpgsbj.supabase.co'
      const supabaseKey = 'sb_publishable_ZHBBlxQVW0MBUUwQ5Kv1Aw_uufRzvu1'
      const functionsUrl = `${supabaseUrl}/functions/v1`
      const logPrefix = '[SMS Reply]'

      const elements = {
        state: document.getElementById('state'),
        context: document.getElementById('message-context'),
        sender: document.getElementById('sender'),
        body: document.getElementById('body'),
        form: document.getElementById('reply-form'),
        verifyForm: document.getElementById('verify-form'),
        phoneLast4: document.getElementById('phone-last4'),
        passcode: document.getElementById('passcode'),
        verifyButton: document.getElementById('verify-button'),
        message: document.getElementById('reply-message'),
        charCount: document.getElementById('char-count'),
        button: document.getElementById('send-button'),
      }

      const token = getReplyToken()

      window.addEventListener('error', (event) => {
        console.error(logPrefix, 'Unhandled page error', event.error || event.message)
        elements.state.textContent = 'The reply page failed to load. Check the browser console for details.'
      })

      window.addEventListener('unhandledrejection', (event) => {
        console.error(logPrefix, 'Unhandled async error', event.reason)
        elements.state.textContent = errorMessage(event.reason)
      })

      for (const codeInput of [elements.phoneLast4, elements.passcode]) {
        codeInput.addEventListener('input', () => {
          codeInput.value = codeInput.value.replace(/\D/g, '').slice(0, 4)
        })
      }

      elements.message.addEventListener('input', () => {
        elements.charCount.textContent = `${elements.message.value.length} / 1900`
      })

      elements.verifyForm.addEventListener('submit', async (event) => {
        event.preventDefault()
        await verifyLink()
      })

      elements.form.addEventListener('submit', async (event) => {
        event.preventDefault()
        const message = elements.message.value.trim()
        if (!message) return

        setBusy(true)

        try {
          console.info(logPrefix, 'Sending reply')
          await callFunction('sms-reply-link-send', {
            token,
            message,
            phone_last4: elements.phoneLast4.value,
            passcode: elements.passcode.value,
          })
          elements.form.hidden = true
          elements.state.textContent = 'Reply sent. This link is now closed.'
          window.history.replaceState({}, '', window.location.pathname)
        } catch (error) {
          console.error(logPrefix, 'Reply send failed', error)
          elements.state.textContent = errorMessage(error)
          setBusy(false)
        }
      })

      async function boot() {
        console.info(logPrefix, 'Booting reply page', { path: window.location.pathname, hasToken: Boolean(token) })

        if (!token) {
          elements.state.textContent = 'This reply link is missing or invalid.'
          return
        }

        elements.verifyForm.hidden = false
        elements.state.textContent = 'Enter the phone digits and passcode from the message.'
      }

      async function verifyLink() {
        if (elements.phoneLast4.value.length !== 4 || elements.passcode.value.length !== 4) {
          elements.state.textContent = 'Enter the last 4 phone digits and 4 digit passcode.'
          return
        }

        setVerifyBusy(true)

        try {
          console.info(logPrefix, 'Checking reply token')
          const data = await callFunction('sms-reply-link-get', {
            token,
            phone_last4: elements.phoneLast4.value,
            passcode: elements.passcode.value,
          })
          elements.sender.textContent = data.reply.inbound_sender || 'Unknown sender'
          elements.body.textContent = data.reply.inbound_body || ''
          elements.context.hidden = false
          elements.form.hidden = false
          elements.verifyForm.hidden = true
          elements.state.textContent = `Reply link expires ${formatDate(data.reply.expires_at)}.`
        } catch (error) {
          console.error(logPrefix, 'Reply token check failed', error)
          elements.state.textContent = errorMessage(error)
          setVerifyBusy(false)
        }
      }

      async function callFunction(name, body) {
        const controller = new AbortController()
        const timeout = window.setTimeout(() => controller.abort(), 15000)

        let response
        try {
          response = await fetch(`${functionsUrl}/${name}`, {
            method: 'POST',
            headers: {
              apikey: supabaseKey,
              Authorization: `Bearer ${supabaseKey}`,
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(body),
            signal: controller.signal,
          })
        } catch (error) {
          if (error?.name === 'AbortError') {
            throw new Error(`Timed out calling ${name}.`)
          }
          throw new Error(`Could not reach ${name}: ${errorMessage(error)}`)
        } finally {
          window.clearTimeout(timeout)
        }

        const text = await response.text()
        let payload = {}
        try {
          payload = text ? JSON.parse(text) : {}
        } catch (error) {
          console.error(logPrefix, 'Function returned non-JSON response', { name, status: response.status, text })
          throw new Error(`Function ${name} returned an invalid response.`)
        }

        console.info(logPrefix, 'Function response', { name, status: response.status, ok: response.ok })
        if (!response.ok) throw new Error(payload.error || `Request failed with HTTP ${response.status}`)
        return payload
      }

      function setBusy(isBusy) {
        elements.button.disabled = isBusy
        elements.button.textContent = isBusy ? 'Sending...' : 'Send Reply'
      }

      function setVerifyBusy(isBusy) {
        elements.verifyButton.disabled = isBusy
        elements.verifyButton.textContent = isBusy ? 'Checking...' : 'Continue'
      }

      function formatDate(value) {
        return value ? new Date(value).toLocaleString() : ''
      }

      function getReplyToken() {
        const pathMatch = window.location.pathname.match(/^\/r\/([^/?#]+)/)
        if (pathMatch?.[1]) return decodeURIComponent(pathMatch[1]).trim()

        const search = window.location.search || ''
        const params = new URLSearchParams(search)
        const namedToken = params.get('t') || params.get('token')
        if (namedToken) return namedToken.trim()

        const rawQuery = search.startsWith('?') ? search.slice(1) : search
        if (!rawQuery || rawQuery.includes('=')) return ''
        return decodeURIComponent(rawQuery).trim()
      }

      function errorMessage(error) {
        if (error instanceof Error) return error.message
        if (typeof error === 'string') return error
        return 'Something went wrong loading this reply link.'
      }

      boot()
    </script>
  </body>
</html>
